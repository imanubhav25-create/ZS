<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEET PG 2026 - Ultimate Study Console</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@400;600;800&display=swap');

        :root { --dynamic-color: #ff3131; }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif;
            background: transparent;
            overflow: hidden;
            color: white;
        }

        #glass-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: -1;
        }

        /* --- TOP LEFT: CLOCK MODULE --- */
        #clock-module {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.5); padding: 10px 15px;
            border-radius: 50px 15px 15px 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #analog-clock {
            width: 60px; height: 60px;
            border: 2px solid var(--dynamic-color);
            border-radius: 50%; position: relative; background: rgba(0,0,0,0.3);
        }
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom; border-radius: 10px;
            background: white; transform: translateX(-50%);
        }
        .hour { height: 15px; width: 3px; }
        .min { height: 22px; width: 2px; }
        .sec { height: 25px; width: 1px; background: var(--dynamic-color); }
        #digital-clock { font-family: 'Orbitron'; font-size: 1.2rem; }

        /* --- TOP RIGHT: COUNTDOWN --- */
        #day-banner {
            position: absolute; top: 20px; right: 20px;
            width: 140px; background: white; border-radius: 10px;
            text-align: center; border: 3px solid var(--dynamic-color);
        }
        #banner-head { background: var(--dynamic-color); font-size: 0.6rem; font-weight: 900; padding: 5px; }
        #banner-days { color: #000; font-family: 'Orbitron'; font-size: 2rem; padding: 5px 0; }
        .neet-text { color: #666; font-size: 0.7rem; font-weight: 800; padding-bottom: 5px; }

        /* --- WIDGETS --- */
        .widget {
            position: absolute; background: rgba(0, 0, 0, 0.55);
            padding: 15px; border-radius: 12px;
            backdrop-filter: blur(10px); width: 320px;
            border-bottom: 3px solid var(--dynamic-color);
        }
        #bottom-left { left: 20px; bottom: 20px; }
        #bottom-right { right: 20px; bottom: 20px; }

        .label { font-size: 0.65rem; letter-spacing: 1.5px; color: #aaa; margin-bottom: 10px; font-weight: 800; }
        .item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; display: inline-block; }
        .complete { color: #2ecc71; text-decoration: line-through; opacity: 0.6; }
        #progress-bar { height: 4px; width: 0%; background: var(--dynamic-color); transition: 1s linear; margin-top: 5px; box-shadow: 0 0 10px var(--dynamic-color); }

        /* --- BRB SCREEN --- */
        #brb-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #doom-pic { width: 350px; height: 350px; border-radius: 50%; border: 5px solid var(--dynamic-color); object-fit: cover; margin-bottom: 20px; }
        #next-time { color: var(--dynamic-color); font-size: 3rem; font-weight: 900; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="glass-layer"></div>

    <!-- Top Left: New Delhi Clock -->
    <div id="clock-module">
        <div id="analog-clock">
            <div id="h-hand" class="hand hour"></div>
            <div id="m-hand" class="hand min"></div>
            <div id="s-hand" class="hand sec"></div>
        </div>
        <div id="digital-clock">00:00:00</div>
    </div>

    <!-- Top Right: Countdown -->
    <div id="day-banner">
        <div id="banner-head">DAYS LEFT</div>
        <div id="banner-days">--</div>
        <div class="neet-text">NEET PG AUG 2026</div>
    </div>

    <!-- Bottom Left: Multi-Targets -->
    <div id="bottom-left" class="widget">
        <div class="label">DAILY TARGET TRACKER</div>
        <div id="target-list"></div>
    </div>

    <!-- Bottom Right: Dynamic Sessions -->
    <div id="bottom-right" class="widget">
        <div class="label">CURRENT SESSION</div>
        <div id="active-name" style="font-size: 1.1rem; font-weight: 800; color: var(--dynamic-color);">Break</div>
        <div style="width:100%; background:rgba(255,255,255,0.1); height:4px; margin: 8px 0;">
            <div id="progress-bar"></div>
        </div>
        
        <div class="label" style="margin-top: 15px;">FULL SCHEDULE</div>
        <div id="schedule-list"></div>
    </div>

    <!-- Auto Gap/BRB Screen -->
    <div id="brb-screen">
        <img id="doom-pic" src="" alt="Doom">
        <div id="doom-msg" style="font-family:'Orbitron'; font-size:1.3rem; margin:20px; color:white; max-width:70%;"></div>
        <div style="color: #666; letter-spacing: 2px; font-size: 0.8rem;">NEXT SESSION STARTS IN</div>
        <div id="next-time">00:00</div>
    </div>

    <script>
        const EXAM_DATE = new Date("2026-08-30T00:00:00");
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/1q5H4GwTK4NTXD7KdUpNBlhhtrMUVJroW3b30AslL4HM/export?format=csv";
        
        const doomResources = [
            {img: "https://i.postimg.cc/85M6XmG2/doom1.jpg", msg: "VICTORY AT ALL COSTS. DOOM OVERSEES YOUR ASCENSION."},
            {img: "https://i.postimg.cc/9f0fNn8k/doom2.jpg", msg: "REST IS A TEMPORARY WEAKNESS. PREPARE FOR THE NEXT STRIKE."},
            {img: "https://i.postimg.cc/43X7S3z1/doom3.jpg", msg: "DOOM IS PLEASED WITH YOUR DISCIPLINE. CONTINUE THE CONQUEST."}
        ];

        let allData = [];

        // 1. Clock Logic (IST)
        function updateClocks() {
            const now = new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"});
            const ist = new Date(now);
            
            const h = ist.getHours();
            const m = ist.getMinutes();
            const s = ist.getSeconds();

            // Analog
            document.getElementById('h-hand').style.transform = `translateX(-50%) rotate(${(h * 30) + (m / 2)}deg)`;
            document.getElementById('m-hand').style.transform = `translateX(-50%) rotate(${(m * 6)}deg)`;
            document.getElementById('s-hand').style.transform = `translateX(-50%) rotate(${(s * 6)}deg)`;

            // Digital
            document.getElementById('digital-clock').innerText = ist.toLocaleTimeString('en-GB');
        }

        // 2. Color Logic (120 options)
        function updateColor() {
            const hue = (new Date().getHours() * 3) % 360;
            document.documentElement.style.setProperty('--dynamic-color', `hsl(${hue}, 90%, 50%)`);
        }

        // 3. Spreadsheet Logic
        async function sync() {
            try {
                const res = await fetch(SHEET_CSV + '?c=' + Date.now());
                const text = await res.text();
                allData = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, "").trim()));
                
                // Render Targets
                const tList = document.getElementById('target-list');
                tList.innerHTML = "";
                allData.filter(r => r[0] === "Target").forEach(r => {
                    const isDone = r[2].toLowerCase() === "complete";
                    tList.innerHTML += `<div class="item-row ${isDone ? 'complete' : ''}">
                        <span><span class="status-dot" style="background:${isDone ? '#2ecc71' : 'var(--dynamic-color)'}"></span>${r[1]}</span>
                    </div>`;
                });
            } catch (e) { console.warn("Sheet Sync Fail"); }
        }

        // 4. Session Engine
        function runEngine() {
            const now = new Date();
            const timeNow = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const sessions = allData.filter(r => r[0] === "Session");
            
            let active = null;
            let next = null;
            const sList = document.getElementById('schedule-list');
            sList.innerHTML = "";

            sessions.forEach(s => {
                const [start, end] = s[2].split('-');
                if (timeNow >= start && timeNow < end) active = { name: s[1], start, end };
                else if (start > timeNow && !next) next = { name: s[1], start };
                
                sList.innerHTML += `<div class="item-row" style="opacity:${timeNow > end ? '0.3' : '1'}">
                    <span>${s[1]}</span><span>${s[2]}</span>
                </div>`;
            });

            // BRB System
            const brb = document.getElementById('brb-screen');
            if (!active) {
                if (brb.style.display !== 'flex') {
                    const p = doomResources[Math.floor(Math.random() * doomResources.length)];
                    document.getElementById('doom-pic').src = p.img;
                    document.getElementById('doom-msg').innerText = p.msg;
                    brb.style.display = 'flex';
                }
                if (next) {
                    const [nh, nm] = next.start.split(':');
                    const nt = new Date(); nt.setHours(nh, nm, 0);
                    const diff = nt - now;
                    document.getElementById('next-time').innerText = Math.floor(diff/60000) + ":" + Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                } else {
                    document.getElementById('next-time').innerText = "DONE";
                }
            } else {
                brb.style.display = 'none';
                document.getElementById('active-name').innerText = active.name;
                const [sh, sm] = active.start.split(':');
                const [eh, em] = active.end.split(':');
                const st = new Date(); st.setHours(sh, sm, 0);
                const et = new Date(); et.setHours(eh, em, 0);
                document.getElementById('progress-bar').style.width = ((now - st) / (et - st) * 100) + "%";
            }

            // Countdown
            document.getElementById('banner-days').innerText = Math.max(0, Math.ceil((EXAM_DATE - now) / 86400000));
        }

        setInterval(updateClocks, 1000);
        setInterval(runEngine, 1000);
        setInterval(sync, 30000);
        setInterval(updateColor, 3600000);
        updateColor();
        updateClocks();
        sync();
    </script>
</body>
</html>
