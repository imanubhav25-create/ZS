<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEET PG 2026 - Master Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@400;600;800;900&display=swap');

        :root { --dynamic-color: #00ffcc; }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif;
            background: transparent;
            overflow: hidden;
            color: white;
        }

        #glass-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: -1;
        }

        /* TOP LEFT: DELHI CLOCK */
        #clock-module {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.6); padding: 10px 20px;
            border-radius: 50px 15px 15px 50px;
            border: 2px solid var(--dynamic-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #analog-clock {
            width: 50px; height: 50px;
            border: 2px solid white;
            border-radius: 50%; position: relative;
        }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: white; transform: translateX(-50%); }
        .hour { height: 12px; width: 3px; }
        .min { height: 18px; width: 2px; }
        .sec { height: 20px; width: 1px; background: var(--dynamic-color); }
        #digital-clock { font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 1px; }

        /* TOP RIGHT: AUTO COUNTDOWN */
        #day-banner {
            position: absolute; top: 20px; right: 20px;
            width: 160px; background: white; border-radius: 12px;
            text-align: center; border: 4px solid var(--dynamic-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #banner-head { background: var(--dynamic-color); font-size: 0.7rem; font-weight: 900; padding: 6px; color: black; }
        #banner-days { color: #000; font-family: 'Orbitron'; font-size: 2.5rem; padding: 5px 0; line-height: 1; }
        .neet-text { color: #888; font-size: 0.75rem; font-weight: 900; padding-bottom: 10px; letter-spacing: 1px; }

        /* WIDGETS */
        .widget {
            position: absolute; background: rgba(0, 0, 0, 0.65);
            padding: 20px; border-radius: 15px;
            backdrop-filter: blur(15px); width: 340px;
            border-bottom: 4px solid var(--dynamic-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        #bottom-left { left: 20px; bottom: 20px; }
        #bottom-right { right: 20px; bottom: 20px; }

        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc; margin-bottom: 12px; font-weight: 800; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.9rem; font-weight: 600; }
        .complete { color: #2ecc71; text-decoration: line-through; opacity: 0.5; }
        #progress-fill { height: 6px; width: 0%; background: var(--dynamic-color); transition: 1s linear; box-shadow: 0 0 15px var(--dynamic-color); border-radius: 3px; }

        /* BRB / GAP SCREEN */
        #brb-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #doom-pic { width: 450px; height: 450px; border-radius: 25px; border: 5px solid var(--dynamic-color); object-fit: cover; margin-bottom: 30px; }
        #doom-msg { font-family: 'Orbitron'; font-size: 1.6rem; color: white; max-width: 80%; line-height: 1.4; margin-bottom: 20px; text-transform: uppercase; }
        #next-session-box { background: rgba(255,255,255,0.05); padding: 20px 40px; border-radius: 15px; border: 1px solid var(--dynamic-color); }
    </style>
</head>
<body>

    <div id="glass-layer"></div>

    <!-- Clock -->
    <div id="clock-module">
        <div id="analog-clock">
            <div id="h-hand" class="hand hour"></div>
            <div id="m-hand" class="hand min"></div>
            <div id="s-hand" class="hand sec"></div>
        </div>
        <div id="digital-clock">00:00:00</div>
    </div>

    <!-- Countdown -->
    <div id="day-banner">
        <div id="banner-head">COUNTDOWN ACTIVE</div>
        <div id="banner-days">--</div>
        <div class="neet-text">DAYS TO NEET PG</div>
    </div>

    <!-- Targets -->
    <div id="bottom-left" class="widget">
        <div class="label" id="lbl-color">Target Tracker</div>
        <div id="target-list"></div>
    </div>

    <!-- Active Session -->
    <div id="bottom-right" class="widget">
        <div class="label" id="lbl-color2">Current Session</div>
        <div id="active-name" style="font-size: 1.3rem; font-weight: 900; color: white;">Break</div>
        <div style="width:100%; background:rgba(255,255,255,0.1); height:6px; margin: 12px 0; border-radius:3px;">
            <div id="progress-fill"></div>
        </div>
        <div class="label" style="margin-top: 20px;">Day Schedule</div>
        <div id="schedule-list" style="max-height: 150px; overflow: hidden;"></div>
    </div>

    <!-- Gap Session Screen -->
    <div id="brb-screen">
        <img id="doom-pic" src="" alt="Dr. Doom">
        <div id="doom-msg"></div>
        <div id="next-session-box">
            <div style="color: #888; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px;">NEXT SESSION STARTS IN</div>
            <div id="next-time" style="font-family:'Orbitron'; font-size: 3.5rem; color: var(--dynamic-color);">00:00</div>
        </div>
    </div>

    <script>
        const EXAM_DATE = new Date("2026-08-30T00:00:00");
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/1q5H4GwTK4NTXD7KdUpNBlhhtrMUVJroW3b30AslL4HM/export?format=csv";
        
        // 12 Images & 12 Motivationals
        const doomVault = [
            {img: "https://i.postimg.cc/85M6XmG2/doom1.jpg", msg: "Victory belongs to the most persevering."},
            {img: "https://i.postimg.cc/9f0fNn8k/doom2.jpg", msg: "Do not let the fatigue of today dim your focus."},
            {img: "https://i.postimg.cc/43X7S3z1/doom3.jpg", msg: "Doom demands your absolute best. Prepare yourself."},
            {img: "https://i.postimg.cc/WzX6QkM9/doom4.jpg", msg: "Your rank is being forged in these silent hours."},
            {img: "https://i.postimg.cc/BvB7vQ6p/doom5.jpg", msg: "Silence your doubts. Discipline is the only way."},
            {img: "https://i.postimg.cc/XvG6Vz9y/doom6.jpg", msg: "Even kings must strategize. Recover and return."},
            {img: "https://i.postimg.cc/Y9S6Rz1z/doom7.jpg", msg: "Every minute of rest is a minute for your rival."},
            {img: "https://i.postimg.cc/mD8zQz6y/doom8.jpg", msg: "The throne of medicine awaits the disciplined."},
            {img: "https://i.postimg.cc/fRT6Xz4y/doom9.jpg", msg: "Do not falter. The conquest is almost complete."},
            {img: "https://i.postimg.cc/L5X6Xz7z/doom10.jpg", msg: "Focus is the ultimate weapon of a Doctor."},
            {img: "https://i.postimg.cc/vH8Xz1z1/doom11.jpg", msg: "Rest is not defeat. It is ammunition for the next task."},
            {img: "https://i.postimg.cc/sX6Xz3z3/doom12.jpg", msg: "Face the exam with the heart of a Conqueror."}
        ];

        let allData = [];

        // Clock System
        function updateIST() {
            const ist = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            const h = ist.getHours(), m = ist.getMinutes(), s = ist.getSeconds();
            document.getElementById('h-hand').style.transform = `translateX(-50%) rotate(${(h * 30) + (m / 2)}deg)`;
            document.getElementById('m-hand').style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
            document.getElementById('s-hand').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('digital-clock').innerText = ist.toLocaleTimeString('en-GB');
        }

        // 120 Color Dynamic Cycle
        function updateTheme() {
            const now = new Date();
            const totalHours = (now.getDate() * 24) + now.getHours();
            const hue = (totalHours * 3) % 360;
            document.documentElement.style.setProperty('--dynamic-color', `hsl(${hue}, 100%, 50%)`);
        }

        // Sheet Sync
        async function sync() {
            try {
                const res = await fetch(SHEET_CSV + '?cache=' + Date.now());
                const text = await res.text();
                allData = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, "").trim()));
                
                const tList = document.getElementById('target-list');
                tList.innerHTML = "";
                allData.filter(r => r[0] === "Target").forEach(r => {
                    const done = r[2].toLowerCase() === "complete";
                    tList.innerHTML += `<div class="item-row ${done ? 'complete' : ''}"><span>${r[1]}</span><span>${done ? '✓' : '●'}</span></div>`;
                });
            } catch (e) { console.warn("Syncing..."); }
        }

        // Automation Engine
        function runOverlay() {
            const ist = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            const timeStr = ist.getHours().toString().padStart(2, '0') + ":" + ist.getMinutes().toString().padStart(2, '0');
            const sessions = allData.filter(r => r[0] === "Session");
            
            let active = null; let next = null;
            const sList = document.getElementById('schedule-list'); sList.innerHTML = "";

            sessions.forEach(s => {
                const [start, end] = s[2].split('-');
                if (timeStr >= start && timeStr < end) active = { name: s[1], start, end };
                else if (start > timeStr && !next) next = { name: s[1], start };
                sList.innerHTML += `<div class="item-row" style="opacity:${timeStr > end ? '0.3' : '1'}"><span>${s[1]}</span><span>${s[2]}</span></div>`;
            });

            // Gap Management
            const brb = document.getElementById('brb-screen');
            if (!active) {
                if (brb.style.display !== 'flex') {
                    const pick = doomVault[Math.floor(Math.random() * doomVault.length)];
                    document.getElementById('doom-pic').src = pick.img;
                    document.getElementById('doom-msg').innerText = pick.msg;
                    brb.style.display = 'flex';
                }
                if (next) {
                    const [nh, nm] = next.start.split(':');
                    const nt = new Date(); nt.setHours(nh, nm, 0);
                    const diff = nt - ist;
                    document.getElementById('next-time').innerText = Math.floor(diff/60000) + ":" + Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                } else { document.getElementById('next-time').innerText = "DONE"; }
            } else {
                brb.style.display = 'none';
                document.getElementById('active-name').innerText = active.name;
                const [sh, sm] = active.start.split(':'), [eh, em] = active.end.split(':');
                const st = new Date(); st.setHours(sh, sm, 0); const et = new Date(); et.setHours(eh, em, 0);
                document.getElementById('progress-fill').style.width = ((ist - st) / (et - st) * 100) + "%";
            }

            // Days Countdown (Ends at 29th Aug)
            const daysLeft = Math.max(0, Math.floor((EXAM_DATE - ist) / 86400000));
            document.getElementById('banner-days').innerText = daysLeft;
        }

        setInterval(updateIST, 1000);
        setInterval(runOverlay, 1000);
        setInterval(sync, 30000);
        setInterval(updateTheme, 3600000);
        updateTheme(); updateIST(); sync();
    </script>
</body>
</html>
